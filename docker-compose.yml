# docker-compose.yml - Sistema de Previsão de Acidentes PRF

version: '3.8'

services:
  # Aplicação principal
  prf-accidents:
    build: .
    container_name: prf-accidents-predictor
    ports:
      - "8000:8000"  # API FastAPI
      - "8501:8501"  # Dashboard Streamlit
    environment:
      - PYTHONPATH=/app
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DASHBOARD_PORT=8501
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prf-network

networks:
  prf-network:
    driver: bridge