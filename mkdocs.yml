site_name: Sistema de Previsão de Acidentes PRF
site_description: Sistema inteligente de Machine Learning para análise e previsão da gravidade de acidentes em rodovias federais brasileiras
site_author: mzmvyp
site_url: https://mzmvyp.github.io/tech_challenge_3

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Instalação: installation.md
  - Uso: usage.md
  - API: api.md
  - Dashboard: dashboard.md
  - Contribuição: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
